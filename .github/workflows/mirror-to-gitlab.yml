name: Mirror to GitLab

# Runs on every push to any branch — keeps GitLab in sync with GitHub
on:
  push:
    branches:
      - '**'
  delete: {}   # also mirrors branch deletions

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # must be 0 to get all branches and tags

      - name: Push all branches and tags to GitLab
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${GITLAB_NAMESPACE}/${GITLAB_REPO}.git"
          git push gitlab --all --force
          git push gitlab --tags --force
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_NAMESPACE: ${{ secrets.GITLAB_NAMESPACE }}   # e.g. devkantin
          GITLAB_REPO: ${{ secrets.GITLAB_REPO }}             # e.g. Doctor-3-tier-app
