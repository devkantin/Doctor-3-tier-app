# ─────────────────────────────────────────────────────────────────
# Application pipeline – Maven build + Elastic Beanstalk deploy
#
# Triggers when src/, pom.xml, or this file changes.
#
# Workflow:
#   All branches   →  build (WAR) then test (H2 in-memory)
#   develop branch →  deploy to staging  (automatic)
#   main branch    →  deploy to prod     (manual gate)
#
# Additional CI/CD variable required (from `terraform output`):
#   S3_ARTIFACT_BUCKET  – name of the S3 bucket created by Terraform
# ─────────────────────────────────────────────────────────────────

# ── Shared bases ──────────────────────────────────────────────────
.maven:base:
  image: maven:3.9-eclipse-temurin-17

.deploy:base:
  image: python:3.12-slim
  before_script:
    - pip install --quiet awscli

# ── Trigger rule ──────────────────────────────────────────────────
.app:trigger:
  rules:
    - changes:
        - src/**/*
        - pom.xml
        - .gitlab/ci/application.yml

# ── Build: compile + package WAR (tests skipped here) ─────────────
app:build:
  extends: [.maven:base, .app:trigger]
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS package -DskipTests
  artifacts:
    name: "docapp-war-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/docapp.war
    expire_in: 7 days

# ── Test: unit + integration tests with H2 in-memory DB ──────────
app:test:
  extends: [.maven:base, .app:trigger]
  stage: test
  script:
    - mvn $MAVEN_CLI_OPTS test
  needs:
    - app:build
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    expire_in: 7 days

# ── Deploy helper script (reused by staging + prod jobs) ──────────
.deploy:script: &deploy_script |
  set -e
  VERSION="v${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
  WAR_KEY="releases/${VERSION}/docapp.war"

  echo "==> Uploading WAR to s3://${S3_ARTIFACT_BUCKET}/${WAR_KEY}"
  aws s3 cp target/docapp.war "s3://${S3_ARTIFACT_BUCKET}/${WAR_KEY}"

  echo "==> Creating EB application version: ${VERSION}"
  aws elasticbeanstalk create-application-version \
    --application-name "$EB_APP_NAME" \
    --version-label "$VERSION" \
    --source-bundle "S3Bucket=${S3_ARTIFACT_BUCKET},S3Key=${WAR_KEY}" \
    --no-auto-create-application

  echo "==> Deploying ${VERSION} to ${TARGET_ENV}"
  aws elasticbeanstalk update-environment \
    --environment-name "$TARGET_ENV" \
    --version-label "$VERSION"

  echo "==> Waiting for deployment to complete (up to 20 min) ..."
  aws elasticbeanstalk wait environment-updated \
    --environment-names "$TARGET_ENV"

  echo "==> Done. App URL: http://${TARGET_ENV}.elasticbeanstalk.com"

# ── Deploy: staging (auto on develop branch) ─────────────────────
app:deploy:staging:
  extends: .deploy:base
  stage: deploy
  variables:
    TARGET_ENV: "$EB_STAGING_ENV"
  script:
    - *deploy_script
  needs:
    - job: app:build
      artifacts: true
    - app:test
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - src/**/*
        - pom.xml
  environment:
    name: staging
    url: "http://$EB_STAGING_ENV.elasticbeanstalk.com"

# ── Deploy: production (manual gate on main branch) ───────────────
app:deploy:prod:
  extends: .deploy:base
  stage: deploy
  variables:
    TARGET_ENV: "$EB_PROD_ENV"
  script:
    - *deploy_script
  needs:
    - job: app:build
      artifacts: true
    - app:test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/**/*
        - pom.xml
  environment:
    name: production
    url: "http://$EB_PROD_ENV.elasticbeanstalk.com"
