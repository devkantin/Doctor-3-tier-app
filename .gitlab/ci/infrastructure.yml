# ─────────────────────────────────────────────────────────────────
# Infrastructure pipeline – Terraform → AWS
#
# Triggers when any file under terraform/ (or this file) changes.
# State is stored in GitLab's built-in Terraform HTTP backend.
#
# Workflow:
#   All branches  →  fmt (warn) → validate → plan
#   main only     →  apply  (manual gate)
#   main only     →  destroy (manual gate, emergency only)
# ─────────────────────────────────────────────────────────────────

# ── Shared base ───────────────────────────────────────────────────
.terraform:base:
  image: hashicorp/terraform:1.9
  before_script:
    - cd "$TF_ROOT"
    - |
      terraform init -reconfigure \
        -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}" \
        -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="username=gitlab-ci-token" \
        -backend-config="password=${CI_JOB_TOKEN}" \
        -backend-config="lock_method=POST" \
        -backend-config="unlock_method=DELETE" \
        -backend-config="retry_wait_min=5"
  # All infra jobs pass AWS creds and sensitive tfvars from CI variables
  variables:
    AWS_ACCESS_KEY_ID: "$AWS_ACCESS_KEY_ID"
    AWS_SECRET_ACCESS_KEY: "$AWS_SECRET_ACCESS_KEY"
    AWS_DEFAULT_REGION: "$AWS_DEFAULT_REGION"
    TF_VAR_db_password: "$TF_VAR_db_password"
    TF_VAR_mq_password: "$TF_VAR_mq_password"

# ── Trigger rule (reused below) ───────────────────────────────────
.infra:trigger:
  rules:
    - changes:
        - terraform/**/*
        - .gitlab/ci/infrastructure.yml

# ── tf:fmt – formatting check (informational) ─────────────────────
tf:fmt:
  extends: [.terraform:base, .infra:trigger]
  stage: validate
  script:
    - terraform fmt -check -recursive -diff
  allow_failure: true

# ── tf:validate – syntax + logic check ───────────────────────────
tf:validate:
  extends: [.terraform:base, .infra:trigger]
  stage: validate
  script:
    - terraform validate -no-color

# ── tf:plan – show what would change ─────────────────────────────
tf:plan:
  extends: [.terraform:base, .infra:trigger]
  stage: plan
  script:
    - terraform plan -out=plan.tfplan -no-color 2>&1 | tee "$CI_PROJECT_DIR/plan.txt"
  artifacts:
    name: "tf-plan-$CI_COMMIT_REF_SLUG"
    paths:
      - terraform/plan.tfplan   # binary plan (used by apply)
      - plan.txt                # human-readable (shown in MR)
    expire_in: 7 days
  needs:
    - tf:validate

# ── tf:apply – apply the plan (main branch, manual gate) ─────────
tf:apply:
  extends: .terraform:base
  stage: apply
  script:
    - terraform apply -auto-approve plan.tfplan
  needs:
    - job: tf:plan
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - terraform/**/*
        - .gitlab/ci/infrastructure.yml
      when: manual
  environment:
    name: production/infrastructure
    action: start

# ── tf:destroy – tear down everything (emergency only) ───────────
tf:destroy:
  extends: .terraform:base
  stage: apply
  script:
    - terraform destroy -auto-approve
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: production/infrastructure
    action: stop
