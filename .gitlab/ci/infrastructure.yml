# ─────────────────────────────────────────────────────────────────
# Infrastructure pipeline – Terraform → AWS
#
# Triggers when any file under terraform/ (or this file) changes.
# State is stored in an S3 backend.
#
# Workflow:
#   All branches  →  init → fmt (warn) → validate → plan
#   main only     →  apply  (manual gate)
#   main only     →  destroy (manual gate, emergency only)
#
# terraform init runs ONCE in tf:init and the resulting .terraform/
# directory is passed as an artifact to all downstream jobs so that
# providers are never downloaded more than once per pipeline.
# ─────────────────────────────────────────────────────────────────

# ── Shared base ───────────────────────────────────────────────────
# Note: no terraform init here — tf:init handles it and downstream
# jobs receive .terraform/ via artifact, so init is skipped entirely.
.terraform:base:
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  before_script:
    - cd "$TF_ROOT"

# ── Trigger rule (reused below) ───────────────────────────────────
.infra:trigger:
  rules:
    - changes:
        - terraform/**/*
        - .gitlab/ci/infrastructure.yml

# ── tf:init – initialize once, share .terraform/ via artifact ─────
tf:init:
  extends: [.terraform:base, .infra:trigger]
  stage: validate
  script:
    - |
      terraform init -reconfigure \
        -backend-config="bucket=${TF_STATE_BUCKET}" \
        -backend-config="key=docapp/terraform.tfstate" \
        -backend-config="region=${AWS_DEFAULT_REGION}" \
        -backend-config="encrypt=true"
  artifacts:
    paths:
      - terraform/.terraform/
    expire_in: 1 day

# ── tf:fmt – formatting check (informational) ─────────────────────
tf:fmt:
  extends: [.terraform:base, .infra:trigger]
  stage: validate
  needs:
    - job: tf:init
      artifacts: true
  script:
    - terraform fmt -check -recursive -diff
  allow_failure: true

# ── tf:validate – syntax + logic check ───────────────────────────
tf:validate:
  extends: [.terraform:base, .infra:trigger]
  stage: validate
  needs:
    - job: tf:init
      artifacts: true
  script:
    - terraform validate -no-color

# ── tf:plan – show what would change ─────────────────────────────
tf:plan:
  extends: [.terraform:base, .infra:trigger]
  stage: plan
  needs:
    - job: tf:init
      artifacts: true
    - tf:validate
  script:
    - terraform plan -lock=false -out=plan.tfplan -no-color 2>&1 | tee "$CI_PROJECT_DIR/plan.txt"
  artifacts:
    name: "tf-plan-$CI_COMMIT_REF_SLUG"
    paths:
      - terraform/plan.tfplan
      - terraform/.terraform/    # passed through so tf:apply has it without re-init
      - plan.txt
    expire_in: 7 days

# ── tf:apply – apply the plan (main branch, manual gate) ─────────
tf:apply:
  extends: .terraform:base
  stage: apply
  needs:
    - job: tf:plan
      artifacts: true    # receives plan.tfplan + .terraform/ from tf:plan
  script:
    - apk add --no-cache curl
    - terraform apply -auto-approve -lock=false plan.tfplan
    - |
      echo "── Exporting Terraform outputs to GitLab CI/CD variables ──"
      BUCKET=$(terraform output -raw artifact_bucket)
      echo "artifact_bucket = ${BUCKET}"

      # Try PUT (update existing variable), fall back to POST (create new)
      HTTP_STATUS=$(curl -s -o /tmp/gl_response.json -w "%{http_code}" \
        --request PUT \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"value\":\"${BUCKET}\",\"protected\":false,\"masked\":false}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/variables/S3_ARTIFACT_BUCKET")

      if [ "$HTTP_STATUS" = "404" ]; then
        curl -s --fail \
          --request POST \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"key\":\"S3_ARTIFACT_BUCKET\",\"value\":\"${BUCKET}\",\"protected\":false,\"masked\":false}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/variables"
        echo "S3_ARTIFACT_BUCKET created in GitLab CI/CD variables"
      else
        echo "S3_ARTIFACT_BUCKET updated (HTTP ${HTTP_STATUS})"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - terraform/**/*
        - .gitlab/ci/infrastructure.yml
  environment:
    name: production/infrastructure
    action: start

# ── rds:ready – block app pipeline until RDS is available ────────
rds:ready:
  image: python:3.12-slim
  stage: readiness
  before_script:
    - pip install --quiet awscli
  script:
    - |
      RDS_ID="${EB_APP_NAME}-mysql"
      echo "Waiting for RDS instance '${RDS_ID}' to become available..."
      echo "This can take up to 10 min on first provision, ~5 s if already running."
      aws rds wait db-instance-available \
        --db-instance-identifier "${RDS_ID}"
      echo "RDS instance is available. Proceeding to build stage."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "develop"
  timeout: 35m

# ── tf:destroy – tear down the ENTIRE stack (emergency only) ─────
# Destroys (in dependency order):
#   Elastic Beanstalk env + app → EC2 instances → ALB
#   RDS MySQL (data lost — skip_final_snapshot = true)
#   ElastiCache Memcached
#   Amazon MQ RabbitMQ broker
#   S3 artifact bucket + ALL WAR files (force_destroy = true)
#   IAM role + instance profile
#   Security groups
#   NAT gateway + Elastic IP
#   Public/private subnets → route tables → Internet Gateway → VPC
#
# This job runs its own terraform init because it is a standalone
# emergency action — it must not depend on artifacts from previous
# pipeline stages that may have expired.
tf:destroy:
  extends: .terraform:base
  stage: apply
  script:
    - |
      terraform init -reconfigure \
        -backend-config="bucket=${TF_STATE_BUCKET}" \
        -backend-config="key=docapp/terraform.tfstate" \
        -backend-config="region=${AWS_DEFAULT_REGION}" \
        -backend-config="encrypt=true"
    - |
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  WARNING: This will DESTROY the entire DocApp AWS stack."
      echo "  RDS data will be LOST. S3 WAR files will be DELETED."
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "Resources that will be destroyed:"
      terraform plan -destroy -no-color 2>&1 | grep -E "^  # |will be destroyed" || true
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    - terraform destroy -auto-approve -lock=false
    - echo "All resources destroyed successfully."
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  environment:
    name: production/infrastructure
    action: stop
