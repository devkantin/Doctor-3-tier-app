# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── Database (MySQL / RDS) ────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:docappdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── RabbitMQ (Amazon MQ) ──────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=/

# ── Memcached (ElastiCache) ───────────────────────────────────
memcached.host=${MEMCACHED_HOST:localhost}
memcached.port=${MEMCACHED_PORT:11211}

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logging ───────────────────────────────────────────────────
logging.level.com.docapp=INFO
logging.level.org.springframework.amqp=WARN
