<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>All Appointments — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <h4 class="fw-bold mb-4"><i class="bi bi-calendar3 me-2 text-primary"></i>All Appointments</h4>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light"><tr>
            <th>#</th><th>Patient</th><th>Doctor</th><th>Specialization</th><th>Date</th><th>Time</th><th>Status</th><th>Action</th>
          </tr></thead>
          <tbody>
          <tr th:each="a, i : ${appointments}">
            <td class="text-muted small" th:text="${i.count}"></td>
            <td>
              <div th:text="${a.patient.user.name}"></div>
              <small class="text-muted" th:text="${a.patient.user.email}"></small>
            </td>
            <td th:text="'Dr. ' + ${a.doctor.user.name}"></td>
            <td th:text="${a.doctor.specialization}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.timeSlot}"></td>
            <td>
              <span th:class="'badge ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${a.status.name() == 'COMPLETED'} ? 'bg-info' : (${a.status.name() == 'CANCELLED'} ? 'bg-secondary' : 'bg-danger'))))"
                    th:text="${a.status}"></span>
            </td>
            <td>
              <form th:if="${a.status.name() != 'CANCELLED' and a.status.name() != 'COMPLETED'}"
                    th:action="@{/admin/appointments/{id}/cancel(id=${a.id})}" method="post"
                    onsubmit="return confirm('Cancel this appointment?')">
                <button class="btn btn-outline-danger btn-sm">Cancel</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
