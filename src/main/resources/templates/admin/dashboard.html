<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <h4 class="fw-bold mb-4"><i class="bi bi-grid me-2 text-primary"></i>Admin Dashboard</h4>

  <!-- Stats -->
  <div class="row g-3 mb-5">
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <i class="bi bi-people fs-2 text-primary mb-1"></i>
        <div class="fs-2 fw-bold" th:text="${totalUsers}">0</div>
        <small class="text-muted">Total Users</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <i class="bi bi-person-badge fs-2 text-success mb-1"></i>
        <div class="fs-2 fw-bold" th:text="${totalDoctors}">0</div>
        <small class="text-muted">Doctors</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <i class="bi bi-calendar3 fs-2 text-info mb-1"></i>
        <div class="fs-2 fw-bold" th:text="${totalAppointments}">0</div>
        <small class="text-muted">Appointments</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <i class="bi bi-check-circle fs-2 text-warning mb-1"></i>
        <div class="fs-2 fw-bold" th:text="${completed}">0</div>
        <small class="text-muted">Completed</small>
      </div>
    </div>
  </div>

  <!-- Infrastructure badges -->
  <div class="d-flex flex-wrap gap-2 mb-4">
    <span class="badge bg-primary fs-6 px-3 py-2"><i class="bi bi-database me-2"></i>MySQL / RDS</span>
    <span class="badge bg-success fs-6 px-3 py-2"><i class="bi bi-lightning me-2"></i>Memcached / ElastiCache</span>
    <span class="badge bg-warning text-dark fs-6 px-3 py-2"><i class="bi bi-envelope me-2"></i>RabbitMQ / Amazon MQ</span>
    <span class="badge bg-info fs-6 px-3 py-2"><i class="bi bi-cloud me-2"></i>Spring Boot on Tomcat</span>
  </div>

  <!-- Recent appointments -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center py-3">
      <h6 class="fw-bold mb-0"><i class="bi bi-clock-history me-2"></i>Recent Appointments</h6>
      <a th:href="@{/admin/appointments}" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr>
            <th>Patient</th><th>Doctor</th><th>Specialization</th><th>Date</th><th>Status</th>
          </tr></thead>
          <tbody>
          <tr th:each="a : ${recentAppointments}">
            <td th:text="${a.patient.user.name}"></td>
            <td th:text="'Dr. ' + ${a.doctor.user.name}"></td>
            <td th:text="${a.doctor.specialization}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td><span th:class="'badge ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${a.status.name() == 'COMPLETED'} ? 'bg-info' : 'bg-secondary')))"
                      th:text="${a.status}"></span></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
