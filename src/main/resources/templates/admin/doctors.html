<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Manage Doctors — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>Manage Doctors</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDoctorModal">
      <i class="bi bi-plus-lg me-1"></i>Add Doctor
    </button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light"><tr>
            <th>Doctor</th><th>Specialization</th><th>Qualification</th><th>Experience</th><th>Fee</th><th>Status</th><th>Action</th>
          </tr></thead>
          <tbody>
          <tr th:each="doc : ${doctors}">
            <td>
              <div class="fw-semibold" th:text="'Dr. ' + ${doc.user.name}"></div>
              <small class="text-muted" th:text="${doc.user.email}"></small>
            </td>
            <td th:text="${doc.specialization}"></td>
            <td class="small" th:text="${doc.qualification}"></td>
            <td th:text="${doc.experience} + ' yrs'"></td>
            <td th:text="'$' + ${doc.consultationFee}"></td>
            <td>
              <span th:class="${doc.available} ? 'badge bg-success' : 'badge bg-secondary'"
                    th:text="${doc.available} ? 'Active' : 'Inactive'"></span>
            </td>
            <td>
              <form th:action="@{/admin/doctors/{id}/toggle(id=${doc.id})}" method="post">
                <button type="submit"
                        th:class="${doc.available} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'"
                        th:text="${doc.available} ? 'Deactivate' : 'Activate'">Toggle</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Doctor Modal -->
<div class="modal fade" id="addDoctorModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Add New Doctor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/doctors/add}" method="post">
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required minlength="6"/></div>
            <div class="col-md-6"><label class="form-label">Specialization</label>
              <input type="text" name="specialization" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Qualification</label>
              <input type="text" name="qualification" class="form-control" required/></div>
            <div class="col-md-3"><label class="form-label">Experience (yrs)</label>
              <input type="number" name="experience" class="form-control" min="0" required/></div>
            <div class="col-md-3"><label class="form-label">Consultation Fee ($)</label>
              <input type="number" name="fee" class="form-control" min="0" step="0.01" required/></div>
            <div class="col-md-6"><label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-control"/></div>
            <div class="col-12"><label class="form-label">Bio</label>
              <textarea name="bio" class="form-control" rows="3"></textarea></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Doctor</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
