<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Appointments — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-calendar-check me-2 text-primary"></i>My Appointments</h4>
    <div class="d-flex gap-2">
      <a th:href="@{/doctor/appointments}" class="btn btn-sm btn-outline-secondary">All</a>
      <a th:href="@{/doctor/appointments(status=PENDING)}" class="btn btn-sm btn-outline-warning">Pending</a>
      <a th:href="@{/doctor/appointments(status=CONFIRMED)}" class="btn btn-sm btn-outline-success">Confirmed</a>
      <a th:href="@{/doctor/appointments(status=COMPLETED)}" class="btn btn-sm btn-outline-info">Completed</a>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>No appointments found.
      </div>
      <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light"><tr>
            <th>#</th><th>Patient</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>
          <tr th:each="a, i : ${appointments}">
            <td class="text-muted small" th:text="${i.count}"></td>
            <td>
              <div class="fw-semibold" th:text="${a.patient.user.name}"></div>
              <small class="text-muted" th:text="${a.patient.user.email}"></small>
            </td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.timeSlot}"></td>
            <td class="small" th:text="${a.reason != null ? #strings.abbreviate(a.reason,40) : '-'}"></td>
            <td>
              <span th:class="'badge ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${a.status.name() == 'COMPLETED'} ? 'bg-info' : (${a.status.name() == 'CANCELLED'} ? 'bg-secondary' : 'bg-danger'))))"
                    th:text="${a.status}"></span>
            </td>
            <td>
              <div class="d-flex gap-1 flex-wrap">
                <form th:if="${a.status.name() == 'PENDING'}"
                      th:action="@{/doctor/appointments/{id}/confirm(id=${a.id})}" method="post">
                  <button class="btn btn-success btn-sm">Confirm</button>
                </form>
                <button th:if="${a.status.name() == 'CONFIRMED'}"
                        class="btn btn-info btn-sm text-white"
                        data-bs-toggle="modal" th:data-bs-target="${'#completeModal-' + a.id}">Complete</button>
                <form th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}"
                      th:action="@{/doctor/appointments/{id}/noshow(id=${a.id})}" method="post">
                  <button class="btn btn-outline-secondary btn-sm">No-Show</button>
                </form>
              </div>
              <!-- Complete Modal -->
              <div class="modal fade" th:id="${'completeModal-' + a.id}" tabindex="-1">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h6 class="modal-title fw-bold">Complete Appointment</h6>
                      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form th:action="@{/doctor/appointments/{id}/complete(id=${a.id})}" method="post">
                      <div class="modal-body">
                        <label class="form-label">Doctor's Notes (optional)</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Prescription, follow-up instructions..."></textarea>
                      </div>
                      <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-info btn-sm text-white">Mark Complete</button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
