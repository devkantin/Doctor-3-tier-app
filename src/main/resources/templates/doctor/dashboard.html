<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Doctor Dashboard — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <h4 class="fw-bold mb-1">
    <i class="bi bi-speedometer2 me-2 text-primary"></i>
    Welcome, Dr. <span sec:authentication="principal.name">Doctor</span>
  </h4>
  <p class="text-muted mb-4" th:text="${doctor.specialization}"></p>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-2 fw-bold text-primary" th:text="${total}">0</div>
        <small class="text-muted">Total</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-2 fw-bold text-warning" th:text="${pending}">0</div>
        <small class="text-muted">Pending</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-2 fw-bold text-success" th:text="${confirmed}">0</div>
        <small class="text-muted">Confirmed</small>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-2 fw-bold text-info" th:text="${completed}">0</div>
        <small class="text-muted">Completed</small>
      </div>
    </div>
  </div>

  <!-- Today's appointments -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center py-3">
      <h6 class="fw-bold mb-0"><i class="bi bi-clock me-2"></i>Recent Appointments</h6>
      <a th:href="@{/doctor/appointments}" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="card-body p-0">
      <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-4 text-muted">
        No appointments yet.
      </div>
      <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr>
            <th>Patient</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th><th>Action</th>
          </tr></thead>
          <tbody>
          <tr th:each="a : ${appointments}">
            <td th:text="${a.patient.user.name}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.timeSlot}"></td>
            <td th:text="${a.reason != null ? #strings.abbreviate(a.reason,30) : '-'}"></td>
            <td><span th:class="'badge ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-secondary'))"
                      th:text="${a.status}"></span></td>
            <td>
              <form th:if="${a.status.name() == 'PENDING'}"
                    th:action="@{/doctor/appointments/{id}/confirm(id=${a.id})}" method="post" class="d-inline">
                <button class="btn btn-success btn-sm">Confirm</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
