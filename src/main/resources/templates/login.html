<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow border-0 rounded-4" style="width:420px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-heart-pulse-fill text-primary fs-1"></i>
        <h4 class="fw-bold mt-2">DocApp</h4>
        <p class="text-muted small">Sign in to your account</p>
      </div>

      <div th:if="${param.error}" class="alert alert-danger small">
        <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password.
      </div>
      <div th:if="${param.logout}" class="alert alert-info small">
        <i class="bi bi-check-circle me-2"></i>You have been logged out.
      </div>
      <div th:if="${success}" class="alert alert-success small">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>
      </form>
      <hr/>
      <p class="text-center text-muted small mb-0">
        Don't have an account? <a th:href="@{/register}" class="text-primary">Register as Patient</a>
      </p>
      <p class="text-center text-muted small mt-2">
        <strong>Demo:</strong> admin@docapp.com / Admin@123
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
