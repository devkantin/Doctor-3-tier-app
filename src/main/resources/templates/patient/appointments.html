<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Appointments — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-calendar-check me-2 text-primary"></i>My Appointments</h4>
    <a th:href="@{/patient/doctors}" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i>Book New
    </a>
  </div>

  <div th:if="${#lists.isEmpty(appointments)}" class="card border-0 shadow-sm text-center py-5">
    <i class="bi bi-calendar-x fs-1 text-muted d-block mb-3"></i>
    <p class="text-muted">You have no appointments yet.</p>
    <a th:href="@{/patient/doctors}" class="btn btn-primary mx-auto" style="width:200px">Book Now</a>
  </div>

  <div class="row g-4" th:unless="${#lists.isEmpty(appointments)}">
    <div class="col-md-6" th:each="a : ${appointments}">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h6 class="fw-bold mb-1" th:text="'Dr. ' + ${a.doctor.user.name}"></h6>
              <small class="text-muted" th:text="${a.doctor.specialization}"></small>
            </div>
            <span th:class="'badge fs-6 ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${a.status.name() == 'COMPLETED'} ? 'bg-info' : (${a.status.name() == 'CANCELLED'} ? 'bg-secondary' : 'bg-danger'))))"
                  th:text="${a.status}"></span>
          </div>
          <ul class="list-unstyled small text-muted mb-3">
            <li><i class="bi bi-calendar3 me-2 text-primary"></i><span th:text="${a.appointmentDate}"></span></li>
            <li><i class="bi bi-clock me-2 text-primary"></i><span th:text="${a.timeSlot}"></span></li>
            <li th:if="${a.reason != null and !a.reason.isBlank()}">
              <i class="bi bi-chat-left-text me-2 text-primary"></i><span th:text="${a.reason}"></span>
            </li>
            <li th:if="${a.notes != null and !a.notes.isBlank()}">
              <i class="bi bi-journal-text me-2 text-info"></i><em th:text="${a.notes}"></em>
            </li>
          </ul>
          <form th:if="${a.status.name() == 'PENDING' or a.status.name() == 'CONFIRMED'}"
                th:action="@{/patient/appointments/{id}/cancel(id=${a.id})}" method="post"
                onsubmit="return confirm('Cancel this appointment?')">
            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
              <i class="bi bi-x-circle me-1"></i>Cancel Appointment
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
