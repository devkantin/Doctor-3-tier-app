<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Book Appointment — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/patient/doctors}">Find Doctors</a></li>
      <li class="breadcrumb-item active">Book Appointment</li>
    </ol>
  </nav>

  <div class="row g-4">
    <!-- Doctor info -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm sticky-top" style="top:1rem">
        <div class="card-body text-center p-4">
          <div class="avatar-circle avatar-lg bg-primary text-white mx-auto mb-3">
            <span th:text="${#strings.substring(doctor.user.name, 0, 1)}">D</span>
          </div>
          <h5 class="fw-bold" th:text="'Dr. ' + ${doctor.user.name}"></h5>
          <p class="text-primary fw-semibold small" th:text="${doctor.specialization}"></p>
          <hr/>
          <ul class="list-unstyled text-start small text-muted">
            <li class="mb-2"><i class="bi bi-award me-2"></i><span th:text="${doctor.qualification}"></span></li>
            <li class="mb-2"><i class="bi bi-briefcase me-2"></i><span th:text="${doctor.experience} + ' yrs experience'"></span></li>
            <li class="mb-2"><i class="bi bi-telephone me-2"></i><span th:text="${doctor.phone}"></span></li>
            <li><i class="bi bi-currency-dollar me-2 text-success"></i>
              <strong class="text-success" th:text="'$' + ${doctor.consultationFee}"></strong> per visit</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Booking form -->
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 py-3">
          <h5 class="fw-bold mb-0"><i class="bi bi-calendar-plus me-2 text-primary"></i>Select Date &amp; Time</h5>
        </div>
        <div class="card-body p-4">
          <!-- Step 1: pick date -->
          <form th:action="@{/patient/book/{id}(id=${doctor.id})}" method="get" class="mb-4">
            <label class="form-label fw-semibold">Choose Appointment Date</label>
            <div class="input-group">
              <input type="date" name="date" class="form-control"
                     th:value="${selectedDate}" th:min="${today}" required/>
              <button type="submit" class="btn btn-outline-primary">Check Slots</button>
            </div>
          </form>

          <!-- Step 2: pick slot & confirm -->
          <form th:if="${availableSlots != null}" th:action="@{/patient/book}" method="post">
            <input type="hidden" name="doctorId" th:value="${doctor.id}"/>
            <input type="hidden" name="date" th:value="${selectedDate}"/>

            <div th:if="${#lists.isEmpty(availableSlots)}" class="alert alert-warning">
              <i class="bi bi-calendar-x me-2"></i>No available slots for this date. Please try another day.
            </div>

            <div th:unless="${#lists.isEmpty(availableSlots)}">
              <label class="form-label fw-semibold">Available Time Slots</label>
              <div class="row g-2 mb-4">
                <div class="col-6 col-md-4" th:each="slot : ${availableSlots}">
                  <input type="radio" class="btn-check" name="timeSlot"
                         th:id="${'slot-' + slot}" th:value="${slot}" required/>
                  <label class="btn btn-outline-primary w-100" th:for="${'slot-' + slot}" th:text="${slot}"></label>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Reason for Visit</label>
                <textarea name="reason" class="form-control" rows="3"
                          placeholder="Briefly describe your symptoms or reason..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-check-circle me-2"></i>Confirm Appointment
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
