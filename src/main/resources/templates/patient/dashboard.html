<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Patient Dashboard — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{layout :: navbar}"></div>
<div th:replace="~{layout :: alerts}"></div>

<div class="container py-4">
  <h4 class="fw-bold mb-4">
    <i class="bi bi-speedometer2 me-2 text-primary"></i>
    Welcome back, <span sec:authentication="principal.name">Patient</span>!
  </h4>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm stat-card bg-primary text-white">
        <div class="card-body d-flex align-items-center gap-3">
          <i class="bi bi-calendar3 fs-1 opacity-75"></i>
          <div><div class="fs-3 fw-bold" th:text="${totalAppointments}">0</div><small>Total Appointments</small></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm stat-card bg-warning text-dark">
        <div class="card-body d-flex align-items-center gap-3">
          <i class="bi bi-clock fs-1 opacity-75"></i>
          <div><div class="fs-3 fw-bold" th:text="${pending}">0</div><small>Pending</small></div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm stat-card bg-success text-white">
        <div class="card-body d-flex align-items-center gap-3">
          <i class="bi bi-check-circle fs-1 opacity-75"></i>
          <div><div class="fs-3 fw-bold" th:text="${confirmed}">0</div><small>Confirmed</small></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <a th:href="@{/patient/doctors}" class="card border-0 shadow-sm text-decoration-none h-100 hover-card">
        <div class="card-body text-center py-4">
          <i class="bi bi-search text-primary fs-1 mb-2"></i>
          <h6 class="fw-bold">Find a Doctor</h6>
          <p class="text-muted small mb-0">Search by specialization and book instantly</p>
        </div>
      </a>
    </div>
    <div class="col-md-6">
      <a th:href="@{/patient/appointments}" class="card border-0 shadow-sm text-decoration-none h-100 hover-card">
        <div class="card-body text-center py-4">
          <i class="bi bi-list-check text-success fs-1 mb-2"></i>
          <h6 class="fw-bold">My Appointments</h6>
          <p class="text-muted small mb-0">View and manage all your appointments</p>
        </div>
      </a>
    </div>
  </div>

  <!-- Recent appointments -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0 py-3">
      <h6 class="fw-bold mb-0"><i class="bi bi-clock-history me-2"></i>Recent Appointments</h6>
    </div>
    <div class="card-body p-0">
      <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 mb-2 d-block"></i>
        No appointments yet. <a th:href="@{/patient/doctors}">Book your first appointment →</a>
      </div>
      <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr>
            <th>Doctor</th><th>Specialization</th><th>Date</th><th>Time</th><th>Status</th>
          </tr></thead>
          <tbody>
          <tr th:each="a, i : ${appointments}" th:if="${i.index < 5}">
            <td th:text="'Dr. ' + ${a.doctor.user.name}"></td>
            <td th:text="${a.doctor.specialization}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.timeSlot}"></td>
            <td><span th:class="'badge ' + (${a.status.name() == 'CONFIRMED'} ? 'bg-success' : (${a.status.name() == 'PENDING'} ? 'bg-warning text-dark' : (${a.status.name() == 'COMPLETED'} ? 'bg-info' : 'bg-secondary')))" th:text="${a.status}"></span></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
