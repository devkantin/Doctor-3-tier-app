<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register — DocApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light py-5">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary fs-1"></i>
            <h4 class="fw-bold mt-2">Create Patient Account</h4>
          </div>

          <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

          <form th:action="@{/register}" method="post">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold">Full Name *</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Password *</label>
                <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone</label>
                <input type="tel" name="phone" class="form-control" placeholder="+1-555-0000"/>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Gender</label>
                <select name="gender" class="form-select">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Blood Group</label>
                <select name="bloodGroup" class="form-select">
                  <option value="">Select</option>
                  <option>A+</option><option>A-</option>
                  <option>B+</option><option>B-</option>
                  <option>AB+</option><option>AB-</option>
                  <option>O+</option><option>O-</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" name="address" class="form-control" placeholder="City, State"/>
              </div>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary py-2 fw-semibold">Create Account</button>
            </div>
          </form>
          <p class="text-center text-muted small mt-3 mb-0">
            Already have an account? <a th:href="@{/login}" class="text-primary">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
